services:
  - type: web
    name: arac-avcisi-v25
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: DATA_DIR
        value: data
      - key: ENABLE_SCHEDULER
        value: 1
      - key: CHECK_INTERVAL_HOURS
        value: 4
      - key: SECRET_KEY
        generateValue: true
