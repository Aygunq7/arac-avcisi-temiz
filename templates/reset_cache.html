<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cache temizleniyor</title></head><body style="font-family:system-ui;background:#071120;color:white;padding:30px"><h1>Önbellek temizleniyor...</h1><p>Birazdan yeni uygulama açılacak.</p><script>
(async()=>{try{if('serviceWorker' in navigator){let regs=await navigator.serviceWorker.getRegistrations();for(let r of regs){await r.unregister();}}if(window.caches){let keys=await caches.keys();for(let k of keys){await caches.delete(k);}}localStorage.clear();sessionStorage.clear();}catch(e){}location.href='/?v=23&t='+Date.now();})();
</script></body></html>
